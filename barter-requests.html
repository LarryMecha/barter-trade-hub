<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Barter Requests - Digital Soko</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @keyframes handshakePulse { 0%{ transform: scale(1); } 50%{ transform: scale(1.15);} 100%{ transform: scale(1);} }
    #requestsList img { object-fit: contain !important; background: #f3f4f6; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

  <script src="nav.js" defer></script>

  <!-- Main Content -->
  <main class="flex-grow p-8 bg-gray-50">
    <section class="mb-6 bg-blue-50 border border-blue-200 p-4 rounded">
      <h2 class="font-semibold mb-1">Barter Requests</h2>
      <p class="text-sm text-blue-800">Incoming requests for your items appear here. Accept or decline the proposals to finalize the trade status.</p>
    </section>
    <h2 class="text-3xl font-bold mb-6">Barter Requests</h2>

    <div id="requestsList" class="space-y-4">
      <!-- Requests will load here from JS -->
    </div>
  </main>

  <div id="messageModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
    <div class="bg-white p-6 rounded-lg shadow-lg w-11/12 md:w-2/3">
      <div class="text-lg font-bold mb-3">Message Trade Partner</div>
      <textarea id="messageModalInput" rows="3" class="w-full border rounded px-3 py-2" placeholder="Type your message"></textarea>
      <div class="mt-4 flex justify-end gap-3">
        <button id="messageModalCancel" class="px-4 py-2 bg-gray-300 rounded">Cancel</button>
        <button id="messageModalSend" class="px-4 py-2 bg-blue-600 text-white rounded">Send</button>
      </div>
    </div>
  </div>

  <div id="handshakeOverlay" class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center">
    <div class="bg-white rounded-lg shadow p-6 text-center">
      <div class="text-4xl" style="animation: handshakePulse 1s ease infinite;">🤝</div>
      <div class="mt-2 font-semibold">Trade Accepted</div>
      <div id="handshakeItems" class="mt-4 grid grid-cols-2 gap-4"></div>
    </div>
  </div>

  <script src="barter-requests.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
