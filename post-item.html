<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Digital Soko — Post Item</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <div class="flex min-h-screen">
    <aside class="w-64 bg-blue-700 text-white p-6 hidden md:block">
      <div class="text-2xl font-bold mb-6">Digital Soko</div>
      <nav class="space-y-3">
        <a href="dashboard.html" class="block px-3 py-2 rounded hover:bg-blue-600">Dashboard</a>
        <a href="my-items.html" class="block px-3 py-2 rounded hover:bg-blue-600">My Items</a>
        <a href="post-item.html" class="block px-3 py-2 rounded bg-blue-600">Post New Item</a>
        <a href="marketplace.html" class="block px-3 py-2 rounded hover:bg-blue-600">Marketplace</a>
        <a href="barter-requests.html" class="block px-3 py-2 rounded hover:bg-blue-600">Barter Requests</a>
        <a href="messages.html" class="block px-3 py-2 rounded hover:bg-blue-600">Messages</a>
        <a href="settings.html" class="block px-3 py-2 rounded hover:bg-blue-600">Settings</a>
      </nav>
    </aside>

    <!-- Main -->
    <main class="flex-1 p-8">
      <section class="mb-6 bg-blue-50 border border-blue-200 p-4 rounded">
        <h2 class="font-semibold mb-1">Posting Items</h2>
        <p class="text-sm text-blue-800">Fill in item details and choose a trade type. Items appear in the marketplace and your items list.</p>
      </section>
      <h1 class="text-3xl font-bold text-gray-800 mb-6">Post New Item</h1>

      <form id="postItemForm" class="bg-white p-6 rounded-lg shadow-md space-y-4 max-w-2xl">
        <div>
          <label class="block font-semibold mb-1">Item Name</label>
          <input type="text" id="itemName" required class="w-full border px-3 py-2 rounded"/>
        </div>

        <div>
          <label class="block font-semibold mb-1">Description</label>
          <textarea id="itemDesc" rows="3" class="w-full border px-3 py-2 rounded"></textarea>
        </div>

        <div>
          <label class="block font-semibold mb-1">Category</label>
          <select id="itemCategory" required class="w-full border px-3 py-2 rounded">
            <option value="">-- Select Category --</option>
            <option value="Electronics">Electronics</option>
            <option value="Clothing">Clothing</option>
            <option value="Furniture">Furniture</option>
            <option value="Books">Books</option>
            <option value="Sports">Sports</option>
          </select>
        </div>

        <div>
          <label class="block font-semibold mb-1">Condition</label>
          <select id="itemCondition" required class="w-full border px-3 py-2 rounded">
            <option value="">-- Select Condition --</option>
            <option value="New">New</option>
            <option value="Like New">Like New</option>
            <option value="Used">Used</option>
            <option value="Fair">Fair</option>
          </select>
        </div>

        <div>
          <label class="block font-semibold mb-1">Price (Ksh)</label>
          <input type="number" id="itemPrice" required min="0" class="w-full border px-3 py-2 rounded"/>
        </div>

        <div>
          <label class="block font-semibold mb-1">Trade Type</label>
          <select id="itemTradeType" required class="w-full border px-3 py-2 rounded">
            <option value="">-- Select Trade Type --</option>
            <option value="FullAmount">Full Amount</option>
            <option value="TopUp">Top-up</option>
            <option value="Barter">Barter Only</option>
          </select>
        </div>

        <div>
          <label class="block font-semibold mb-1">Upload Image</label>
          <input type="file" id="itemImg" accept="image/*" class="w-full"/>
        </div>

        <div>
          <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
            Post Item
          </button>
        </div>
      </form>
    </main>
  </div>

  <script src="nav.js" defer></script>
  <script src="post-item.js"></script>
</body>
</html>
