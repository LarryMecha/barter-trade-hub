<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Settings - Digital Soko</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <script src="nav.js" defer></script>
  <main class="max-w-3xl mx-auto px-6 py-8">
    <section class="mb-6 bg-blue-50 border border-blue-200 p-4 rounded">
      <h2 class="font-semibold mb-1">Profile Settings</h2>
      <p class="text-sm text-blue-800">View your profile and update your name or password. Logout is available from the navigation.</p>
    </section>

    <div class="bg-white rounded shadow p-6">
      <h3 class="font-bold mb-4">Your Profile</h3>
      <div id="profileBox" class="mb-4 text-gray-700"></div>
      <form id="updateForm" class="space-y-3">
        <input id="name" class="w-full border rounded px-3 py-2" placeholder="Name" />
        <input id="oldPassword" type="password" class="w-full border rounded px-3 py-2" placeholder="Current Password (required to change)" />
        <input id="newPassword" type="password" class="w-full border rounded px-3 py-2" placeholder="New Password (optional)" />
        <button class="px-4 py-2 bg-blue-600 text-white rounded" type="submit">Update</button>
      </form>
    </div>
  </main>
  <script src="settings.js"></script>
</body>
</html>
